services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
        NEXT_PUBLIC_API_SECRET_KEY: ${NEXT_PUBLIC_API_SECRET_KEY:-}
        NEXT_PUBLIC_GITHUB_REPO_URL: ${NEXT_PUBLIC_GITHUB_REPO_URL:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
